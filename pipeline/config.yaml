pipeline:
  log_level: "INFO"
  log_format: "json"

transcription:
  primary_provider: "sofer_ai"           # "sofer_ai" for Hebrew; fallback not yet implemented
  timestamp_provider: "synthetic"        # "openai_whisper" (needs OPENAI_API_KEY) | "synthetic" (estimate from text + audio duration)

sefaria:
  base_url: "https://www.sefaria.org/api"
  language: "he"
  cache_ttl_days: 30

text_alignment:
  llm:
    provider: "openrouter"               # routes through OpenRouter via OpenAI SDK when OPENROUTER_API_KEY is set
    model: "claude-sonnet-4-20250514"    # translated to "anthropic/claude-sonnet-4" for OpenRouter

artifact_planning:
  llm:
    provider: "openrouter"
    model: "claude-sonnet-4-20250514"
  max_artifacts_per_source_unit: 5
  context_mode: "SYNTHESIZED"

image_generation:
  provider: "openrouter"                 # "openrouter" | "replicate" (legacy)
  openrouter:
    model: "google/gemini-2.5-flash-image"   # also: "google/gemini-3-pro-image-preview", "openai/gpt-5-image", "openai/gpt-5-image-mini"
  replicate:                             # kept for fallback / future re-enable
    model: "black-forest-labs/flux-1.1-pro"
  styles:
    enabled:
      - "photorealistic"
      - "watercolor"
      - "cartoon"
      - "line_art"
      - "oil_painting"
    rotation: "random_per_image"
    default: "photorealistic"

telegram:
  upvote_emoji: "\U0001F44D"
  downvote_emoji: "\U0001F44E"
  voting_window_hours: 24

approval:
  min_approval_percentage: 70
  min_total_votes: 3

whatsapp:
  rate_limit_per_second: 20
  max_retries: 3
